<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #3a3a3a;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
  }
  .phone-frame {
    width: 375px;
    background: #0d0d0d;
    border-radius: 44px;
    overflow: hidden;
    box-shadow: 0 40px 80px rgba(0,0,0,0.6);
  }

  /* ── Poster marquee area ── */
  .poster-area {
    position: relative;
    height: 460px;
    overflow: hidden;
    background: #0d0d0d;
  }
  .poster-area::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 200px;
    background: linear-gradient(transparent, #0d0d0d);
    z-index: 10;
    pointer-events: none;
  }

  /* Rotated wrapper so columns are angled */
  .angled-wrap {
    position: absolute;
    top: -60px; left: -30px; right: -30px; bottom: -60px;
    transform: rotate(-8deg);
    transform-origin: center center;
    display: flex;
    gap: 8px;
  }

  .pcol {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 8px;
    will-change: transform;
  }

  .poster {
    flex-shrink: 0;
    border-radius: 10px;
    overflow: hidden;
    background: #1a1a1a;
    position: relative;
  }
  .poster img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .poster.t { height: 150px; }
  .poster.m { height: 115px; }
  .poster.s { height: 95px; }

  .poster-label {
    position: absolute;
    bottom: 6px; left: 8px;
    color: white;
    font-size: 10px;
    font-weight: 800;
    text-shadow: 0 1px 4px rgba(0,0,0,0.9);
    z-index: 2;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  /* App icon */
  .app-icon-wrap {
    position: absolute;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 20;
  }
  .app-icon {
    width: 64px; height: 64px;
    background: #7c3aed;
    border-radius: 18px;
    display: flex; align-items: center; justify-content: center;
  }

  /* Bottom content */
  .bottom-content {
    background: #0d0d0d;
    padding: 10px 24px 32px;
    text-align: center;
  }
  .headline {
    font-size: 30px;
    font-weight: 800;
    color: white;
    line-height: 1.15;
    margin-bottom: 12px;
    letter-spacing: -0.3px;
  }
  .subtext {
    font-size: 14px;
    color: #888;
    line-height: 1.6;
    margin-bottom: 28px;
  }
  .btn-subscribe {
    width: 100%;
    background: white;
    color: #111;
    border: none;
    border-radius: 50px;
    padding: 18px;
    font-size: 15px;
    font-weight: 800;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    cursor: pointer;
    margin-bottom: 14px;
    display: block;
  }
  .btn-try {
    width: 100%;
    background: transparent;
    color: white;
    border: 1.5px solid #333;
    border-radius: 50px;
    padding: 17px;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    cursor: pointer;
    display: block;
  }
</style>

<script>
  const cols = [
    { el: document.getElementById('pc1'), speed: 0.40, y: 0,    dir: -1 },
    { el: document.getElementById('pc2'), speed: 0.65, y: -80,  dir: 1  },
    { el: document.getElementById('pc3'), speed: 0.30, y: -40,  dir: -1 },
    { el: document.getElementById('pc4'), speed: 0.55, y: -120, dir: 1  },
  ];

  function tick() {
    cols.forEach(c => {
      c.y += c.speed * c.dir;
      const half = c.el.scrollHeight / 2;
      if (c.dir === -1 && Math.abs(c.y) >= half) c.y += half;
      if (c.dir ===  1 && c.y >= 0) c.y -= half;
      c.el.style.transform = `translateY(${c.y}px)`;
    });
    requestAnimationFrame(tick);
  }

  tick();
</script>
